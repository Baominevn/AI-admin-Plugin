ai:
  language: "en"
  persona: "smart, clear, polite, and useful"
  intelligence_mode: "high"
  tone: "natural, friendly, lightly modern"
  slang_level: "medium"
  response_style:
    concise: true
    use_examples_when_helpful: true
    max_sentences: 3
  humor:
    enabled: true
    safe_only: true
  expressions:
    enabled: true
    prefix: ""
    suffix: ""
    emoji_rate_percent: 4

anticheat:
  report_points: 4
  report_observe_seconds: 120
  report_observe_interval_seconds: 5
  notify_reporter: true
  suspicion_decay:
    enabled: true
    interval_minutes: 20
    points_per_interval: 1
  behavior:
    speed_threshold_blocks_per_tick: 0.95
    vertical_up_threshold: 0.75
    snap_yaw_threshold: 65.0
    snap_pitch_threshold: 1.2
    cps_warn_threshold: 14
    cps_flag_threshold: 18
    reach_threshold: 3.4
    min_hit_interval_ms: 65

scan:
  random_when_over_limit: true
  prioritize_high_risk_first: true

notifications:
  staff_alert_cooldown_seconds: 5
  send_console_log: true
  mention_admin_in_danger: true

admin_mode:
  relay_publicly: true
  only_admin_can_toggle: true

performance:
  max_parallel_ai_requests: 8
  cache_player_analysis_seconds: 30
  lag_optimizer:
    enabled: true
    sample_ticks: 20
    low_tps_threshold: 17.5
    critical_tps_threshold: 14.5
    low_scan_cap: 30
    critical_scan_cap: 15
    notify_cooldown_seconds: 90
    run_commands_on_critical: false
    critical_command_cooldown_seconds: 180
    critical_commands: []