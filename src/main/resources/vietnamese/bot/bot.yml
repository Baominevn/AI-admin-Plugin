bot:
  enabled: true
  bot_name: "Grox"
  selected: ""
  trigger_tier: "ALERT"
  observe_seconds: 600
  follow_interval_ticks: 20
  commands:
    spawn: []
    follow: []
    remove: []
  ai:
    enabled: true
    use_llm: true
    llm_prefix: "[BotAI] "
    report_interval_seconds: 12
    playful_rate: 0.18
    voice:
      normal:
        - "[BotAI] {bot} đang theo dõi {player} | tier={tier} | suspicion={suspicion}"
        - "[BotAI] {player} có {alerts} cảnh báo, tiếp tục quan sát. {learning}"
      playful:
        - "[BotAI] {player} đang hơi gắt, check kỹ nha."
        - "[BotAI] Nhìn qua thấy {player} khá căng, để ý thêm xíu."
      danger:
        - "[BotAI] Cảnh báo cao: {player} tier={tier}, đề xuất staff vào theo dõi ngay."
        - "[BotAI] Nguy cơ hack rõ hơn: {player}, cảnh báo={alerts}, suspicion={suspicion}. {learning}"